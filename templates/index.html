<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Specific sizing fix for the JD text box */
        #jd_text {
            width: 100%;
            min-height: 200px; /* Increased height for better visibility */
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: vertical; /* Allows user to adjust height if needed */
            box-sizing: border-box; /* Ensures padding doesn't break width */
            margin-top: 0.5rem;
            background-color: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #jd_text:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #ffffff;
        }

        /* Ensuring form sections look consistent */
        .form-section h3 {
            margin-bottom: 0.5rem;
            color: #1e293b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Career Agent</h1>
            <p>Your personalized agent for tailoring applications</p>
        </header>

        <div id="main-interface">
            <form id="applicationForm">
                <div class="form-section">
                    <h3>1. Upload Resume</h3>
                    <div class="file-upload">
                        <input type="file" id="resume" name="resume" accept=".pdf,.docx,.txt" required>
                        <label for="resume">
                            <strong>Click to upload</strong> or drag and drop
                            <span style="font-size: 0.8rem; color: #64748b;">PDF, DOCX, or TXT</span>
                        </label>
                    </div>
                </div>

                <div class="form-section">
                    <h3>2. Job Details</h3>
                    <textarea id="jd_text" name="jd_text" placeholder="Paste the Job Description text or a URL here..." required></textarea>
                </div>

                <button type="submit" class="btn-primary">Generate Tailored Application</button>
            </form>
        </div>

        <div id="loading" style="display: none; text-align: center; margin-top: 3rem;">
            <div class="spinner"></div>
            <h2 id="status-text">Agents are researching...</h2>
            <p style="color: #64748b;">This usually takes 20-30 seconds.</p>
        </div>

        <div id="results" style="display: none;">
            <div class="results-grid">
                <div class="result-card">
                    <h4>Company Research</h4>
                    <div id="companyBrief" class="content-box"></div>
                </div>
                
                <div class="result-card">
                    <h4>Tailored Resume Preview</h4>
                    <div id="tailoredResume" class="content-box"></div>
                </div>

                <div class="result-card">
                    <h4>Cover Letter Preview</h4>
                    <div id="coverLetter" class="content-box"></div>
                </div>
            </div>

            <div class="form-section" style="text-align: center; margin-top: 2rem;">
                <h3>Ready to Apply?</h3>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <a id="dl-resume" href="#" class="btn-primary" style="text-decoration: none;">Download Resume</a>
                    <a id="dl-cover" href="#" class="btn-primary" style="text-decoration: none; background: #7c3aed;">Download Cover Letter</a>
                </div>
                <button onclick="location.reload()" style="margin-top: 1rem; background: none; border: none; color: #64748b; cursor: pointer; text-decoration: underline;">Start New Application</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
